<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Barkodlu Kütüphanem</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #ecf0f1;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* Barkod Okuyucu Tasarımı */
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd !important;
        }

        #status {
            text-align: center;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin: 10px 0;
        }

        /* Kitap Listesi Tasarımı */
        .library-section {
            margin-top: 30px;
        }

        .book-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            transition: transform 0.2s;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .book-card img {
            width: 50px;
            height: 75px;
            object-fit: cover;
            border-radius: 4px;
            background: #eee;
        }

        .book-info {
            flex-grow: 1;
        }

        .book-title {
            font-weight: bold;
            display: block;
            color: var(--primary);
        }

        .book-author {
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .delete-btn {
            background: #ff7675;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Kamera Butonlarını Özelleştirme */
        button {
            background-color: var(--accent) !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 5px !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Akıllı Kütüphanem</h1>
    
    <div id="reader"></div>
    <p id="status">Kamerayı başlatmak için izin verin...</p>

    <div class="library-section">
        <h3>Kitaplarım (<span id="count">0</span>)</h3>
        <div id="book-list">
            </div>
    </div>
</div>

<script>
    let myLibrary = JSON.parse(localStorage.getItem('myBooks')) || [];
    const bookListContainer = document.getElementById('book-list');
    const countSpan = document.getElementById('count');

    // Uygulama başladığında listeyi yükle
    updateUI();

    // 1. Barkod Tarayıcı Ayarları
    const html5QrCode = new Html5Qrcode("reader");
    const qrConfig = { fps: 10, qrbox: { width: 250, height: 150 } };

    html5QrCode.start(
        { facingMode: "environment" }, 
        qrConfig,
        (decodedText) => {
            // Barkod okunduğunda API'ye sor
            document.getElementById('status').innerText = "Aranıyor: " + decodedText;
            fetchBookDetails(decodedText);
        }
    ).catch(err => {
        document.getElementById('status').innerText = "Kamera hatası: " + err;
    });

    // 2. Google Books API ile Veri Çekme
    async function fetchBookDetails(isbn) {
        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await response.json();

            if (data.totalItems > 0) {
                const info = data.items[0].volumeInfo;
                const newBook = {
                    id: Date.now(),
                    title: info.title,
                    author: info.authors ? info.authors.join(', ') : 'Bilinmeyen Yazar',
                    image: info.imageLinks ? info.imageLinks.thumbnail : 'https://via.placeholder.com/50x75?text=Yok'
                };

                // Eğer kitap zaten varsa ekleme
                if(!myLibrary.find(b => b.title === newBook.title)) {
                    myLibrary.unshift(newBook);
                    saveAndRefresh();
                    document.getElementById('status').innerText = "Başarıyla eklendi!";
                } else {
                    document.getElementById('status').innerText = "Bu kitap zaten kütüphanede.";
                }
            } else {
                document.getElementById('status').innerText = "Kitap bulunamadı (ISBN: " + isbn + ")";
            }
        } catch (error) {
            console.error("API Hatası:", error);
            document.getElementById('status').innerText = "Veri çekme hatası.";
        }
    }

    // 3. Verileri Kaydet ve Arayüzü Güncelle
    function saveAndRefresh() {
        localStorage.setItem('myBooks', JSON.stringify(myLibrary));
        updateUI();
    }

    function updateUI() {
        bookListContainer.innerHTML = '';
        countSpan.innerText = myLibrary.length;

        myLibrary.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="${book.image}" alt="Kapak">
                <div class="book-info">
                    <span class="book-title">${book.title}</span>
                    <span class="book-author">${book.author}</span>
                </div>
                <button class="delete-btn" onclick="deleteBook(${book.id})">Sil</button>
            `;
            bookListContainer.appendChild(card);
        });
    }

    // 4. Kitap Silme
    function deleteBook(id) {
        myLibrary = myLibrary.filter(book => book.id !== id);
        saveAndRefresh();
    }
</script>

</body>
</html>
