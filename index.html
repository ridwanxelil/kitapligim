<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Kişisel Kütüphanem</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --error: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 700px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-excel { background: var(--accent); color: white; }
        .btn-manual { background: #f39c12; color: white; }
        button:hover { opacity: 0.8; }

        #reader { width: 100%; border-radius: 12px; border: 2px dashed #ccc; display: none; margin-bottom: 20px; }
        
        /* Manuel Form */
        #manual-form { display: none; background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #manual-form input, #manual-form textarea { width: 95%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* Kitap Listesi */
        .book-card { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; position: relative; }
        .book-card img { width: 70px; height: 100px; object-fit: cover; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .book-details h4 { margin: 0; color: var(--primary); }
        .book-details p { margin: 3px 0; font-size: 0.85rem; color: #666; }
        .summary { font-style: italic; font-size: 0.8rem !important; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .delete-btn { color: var(--error); cursor: pointer; font-size: 0.8rem; border: none; background: none; padding: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Akıllı Kütüphanem</h1>

    <div class="controls">
        <button class="btn-start" onclick="toggleCamera()">📷 Kamerayı Başlat/Kapat</button>
        <button class="btn-manual" onclick="showManualForm()">✍️ Elle Ekle</button>
        <button class="btn-excel" onclick="exportToExcel()">📊 Excel Çıktısı Al</button>
    </div>

    <div id="reader"></div>
    <p id="status" style="text-align: center; color: #666;"></p>

    <div id="manual-form">
        <h4>Kitap Bilgilerini Girin</h4>
        <input type="text" id="m-title" placeholder="Kitap Adı">
        <input type="text" id="m-author" placeholder="Yazar">
        <input type="text" id="m-publisher" placeholder="Yayın Evi">
        <input type="text" id="m-year" placeholder="Baskı Yılı">
        <textarea id="m-summary" placeholder="Özet"></textarea>
        <button class="btn-start" onclick="addManualBook()">Kaydet</button>
        <button onclick="document.getElementById('manual-form').style.display='none'">İptal</button>
    </div>

    <div class="library-section">
        <h3>Kitaplarım (<span id="count">0</span>)</h3>
        <div id="book-list"></div>
    </div>
</div>

<script>
    let myLibrary = JSON.parse(localStorage.getItem('myBooksV2')) || [];
    let html5QrCode = null;

    updateUI();

    // --- KAMERA YÖNETİMİ ---
    function toggleCamera() {
        const readerDiv = document.getElementById('reader');
        if (html5QrCode && html5QrCode.getState() === 2) {
            html5QrCode.stop().then(() => {
                readerDiv.style.display = 'none';
                document.getElementById('status').innerText = "Kamera kapatıldı.";
            });
        } else {
            readerDiv.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    document.getElementById('status').innerText = "Okunuyor: " + decodedText;
                    fetchBookDetails(decodedText);
                }
            ).catch(err => alert("Kamera hatası: " + err));
        }
    }

    // --- API VERİ ÇEKME ---
    async function fetchBookDetails(isbn) {
        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await response.json();

            if (data.totalItems > 0) {
                const info = data.items[0].volumeInfo;
                const book = {
                    id: Date.now(),
                    title: info.title || "Adsız Kitap",
                    author: info.authors ? info.authors.join(', ') : "Bilinmiyor",
                    publisher: info.publisher || "Bilinmiyor",
                    year: info.publishedDate ? info.publishedDate.substring(0, 4) : "Bilinmiyor",
                    summary: info.description || "Özet bulunmuyor.",
                    image: info.imageLinks ? info.imageLinks.thumbnail : 'https://via.placeholder.com/70x100?text=No+Cover'
                };
                addBook(book);
            } else {
                if(confirm("Kitap bulunamadı! Elle eklemek ister misiniz?")) {
                    showManualForm();
                }
            }
        } catch (e) {
            alert("Bağlantı hatası!");
        }
    }

    // --- KİTAP EKLEME/SİLME ---
    function addBook(book) {
        myLibrary.unshift(book);
        save();
        document.getElementById('status').innerText = "Eklendi: " + book.title;
    }

    function deleteBook(id) {
        myLibrary = myLibrary.filter(b => b.id !== id);
        save();
    }

    function save() {
        localStorage.setItem('myBooksV2', JSON.stringify(myLibrary));
        updateUI();
    }

    function showManualForm() {
        document.getElementById('manual-form').style.display = 'block';
        document.getElementById('m-title').focus();
    }

    function addManualBook() {
        const book = {
            id: Date.now(),
            title: document.getElementById('m-title').value,
            author: document.getElementById('m-author').value,
            publisher: document.getElementById('m-publisher').value,
            year: document.getElementById('m-year').value,
            summary: document.getElementById('m-summary').value,
            image: 'https://via.placeholder.com/70x100?text=Manuel'
        };
        if(!book.title) return alert("Kitap adı zorunludur!");
        addBook(book);
        document.getElementById('manual-form').style.display = 'none';
        // Formu temizle
        ['m-title','m-author','m-publisher','m-year','m-summary'].forEach(id => document.getElementById(id).value = '');
    }

    // --- ARAYÜZ ---
    function updateUI() {
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        document.getElementById('count').innerText = myLibrary.length;

        myLibrary.forEach(book => {
            list.innerHTML += `
                <div class="book-card">
                    <img src="${book.image}">
                    <div class="book-details">
                        <h4>${book.title}</h4>
                        <p><strong>Yazar:</strong> ${book.author}</p>
                        <p><strong>Yayıncı:</strong> ${book.publisher} | <strong>Yıl:</strong> ${book.year}</p>
                        <p class="summary">${book.summary}</p>
                        <button class="delete-btn" onclick="deleteBook(${book.id})">🗑️ Listeden Kaldır</button>
                    </div>
                </div>
            `;
        });
    }

    // --- EXCEL EXPORT ---
    function exportToExcel() {
        if(myLibrary.length === 0) return alert("Dışa aktarılacak kitap yok!");
        
        // Veriyi Excel formatına hazırla (Özet alanını temizleyerek)
        const data = myLibrary.map(b => ({
            "Kitap Adı": b.title,
            "Yazar": b.author,
            "Yayın Evi": b.publisher,
            "Baskı Yılı": b.year,
            "Özet": b.summary.substring(0, 500) // Excel hücresi çok dolmasın
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Kitaplarım");
        XLSX.writeFile(wb, "Kutuphanem.xlsx");
    }
</script>

</body>
</html>
