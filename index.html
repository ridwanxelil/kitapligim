<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Lib | Akıllı Kütüphane Sistemi</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1e293b; --secondary: #334155; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        .app-wrapper { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Header & Stats */
        .header { background: white; padding: 1.5rem; border-radius: 1rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 1.5rem; text-align: center; }
        .stats-badge { background: var(--accent); color: white; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.875rem; }

        /* Controls */
        .toolbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
        .btn { border: none; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Scanner */
        #reader { border-radius: 1rem; overflow: hidden; margin-bottom: 1.5rem; border: 2px solid #cbd5e1; display: none; }

        /* Search Bar */
        .search-box { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-bottom: 1.5rem; box-sizing: border-box; }

        /* Book List */
        .book-grid { display: flex; flex-direction: column; gap: 1rem; }
        .book-card { background: white; padding: 1rem; border-radius: 0.75rem; display: flex; gap: 1rem; align-items: flex-start; border: 1px solid transparent; transition: 0.3s; }
        .book-card:hover { border-color: var(--accent); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .book-cover { width: 80px; height: 120px; object-fit: cover; border-radius: 0.375rem; background: #e2e8f0; flex-shrink: 0; }
        .book-info { flex: 1; }
        .book-title { font-size: 1.125rem; font-weight: 700; margin: 0; }
        .book-meta { font-size: 0.875rem; color: var(--secondary); margin: 0.25rem 0; }
        .book-summary { font-size: 0.8125rem; color: #64748b; margin-top: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .delete-link { color: var(--danger); font-size: 0.75rem; cursor: pointer; text-decoration: underline; }

        /* Forms */
        .modal { background: white; padding: 1.5rem; border-radius: 1rem; margin-bottom: 1.5rem; display: none; border: 2px solid var(--accent); }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 0.4rem; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>MyDigitalLibrary <span class="stats-badge" id="count-badge">0 Kitap</span></h1>
        <p style="font-size: 0.8rem; color: #64748b;">Güvenli, Modüler, Profesyonel Veri Yönetimi</p>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" onclick="toggleScanner()">📷 Tara</button>
        <button class="btn btn-outline" onclick="toggleManualForm()">✍️ Manuel</button>
        <button class="btn btn-success" onclick="exportToExcel()">📊 Excel</button>
        <button class="btn btn-outline" onclick="backupJSON()">💾 Yedek Al</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
        <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📂 Yükle</button>
    </div>

    <div id="reader"></div>

    <div id="manual-modal" class="modal">
        <h3>Yeni Kitap Ekle</h3>
        <div class="form-group"><input type="text" id="m-title" placeholder="Kitap Adı"></div>
        <div class="form-group"><input type="text" id="m-author" placeholder="Yazar"></div>
        <div class="form-group"><input type="text" id="m-publisher" placeholder="Yayınevi"></div>
        <div class="form-group"><input type="text" id="m-year" placeholder="Baskı Yılı"></div>
        <div class="form-group"><textarea id="m-summary" rows="3" placeholder="Kitap Özeti"></textarea></div>
        <button class="btn btn-primary" onclick="saveManual()">Sisteme Kaydet</button>
        <button class="btn" onclick="toggleManualForm()">İptal</button>
    </div>

    <input type="text" class="search-box" id="search" placeholder="Kitap, yazar veya yayınevi ara..." onkeyup="filterBooks()">

    <div id="book-list" class="book-grid">
        </div>
</div>

<script>
    // --- VERİ YÖNETİMİ (DATA LAYER) ---
    let library = JSON.parse(localStorage.getItem('pro_library_v3')) || [];
    let html5QrCode = null;

    // --- BAŞLANGIÇ ---
    renderLibrary(library);

    // --- TARAYICI FONKSİYONLARI ---
    async function toggleScanner() {
        const reader = document.getElementById('reader');
        if (html5QrCode && html5QrCode.getState() === 2) {
            await html5QrCode.stop();
            reader.style.display = 'none';
        } else {
            reader.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                (text) => { fetchFromAPI(text); }
            ).catch(err => alert("Kamera izni gerekli!"));
        }
    }

    // --- API ENTEGRASYONU ---
    async function fetchFromAPI(isbn) {
        try {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await res.json();
            if (data.totalItems > 0) {
                const b = data.items[0].volumeInfo;
                commitToLibrary({
                    id: Date.now(),
                    title: b.title,
                    author: b.authors?.join(', ') || 'Bilinmiyor',
                    publisher: b.publisher || 'Bilinmiyor',
                    year: b.publishedDate || 'Bilinmiyor',
                    summary: b.description || 'Özet bulunamadı.',
                    img: b.imageLinks?.thumbnail || ''
                });
                if(html5QrCode) html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
            } else {
                if(confirm("Kitap bulunamadı. Manuel eklemek ister misiniz?")) toggleManualForm();
            }
        } catch (e) { alert("API hatası oluştu."); }
    }

    // --- KAYIT VE KALICILIK ---
    function commitToLibrary(book) {
        library.unshift(book);
        localStorage.setItem('pro_library_v3', JSON.stringify(library));
        renderLibrary(library);
    }

    function deleteBook(id) {
        if(confirm("Bu kitabı kütüphaneden silmek istediğinize emin misiniz? Bu işlem geri alınamaz.")) {
            library = library.filter(b => b.id !== id);
            localStorage.setItem('pro_library_v3', JSON.stringify(library));
            renderLibrary(library);
        }
    }

    // --- ARAYÜZ (UI LAYER) ---
    function renderLibrary(data) {
        const list = document.getElementById('book-list');
        const badge = document.getElementById('count-badge');
        list.innerHTML = '';
        badge.innerText = `${data.length} Kitap`;

        data.forEach(book => {
            list.innerHTML += `
                <div class="book-card">
                    <img src="${book.img || 'https://via.placeholder.com/80x120?text=No+Cover'}" class="book-cover">
                    <div class="book-info">
                        <h4 class="book-title">${book.title}</h4>
                        <p class="book-meta"><strong>Yazar:</strong> ${book.author}</p>
                        <p class="book-meta"><strong>Yayın:</strong> ${book.publisher} (${book.year})</p>
                        <p class="book-summary">${book.summary}</p>
                        <div class="actions">
                            <span class="delete-link" onclick="deleteBook(${book.id})">Kitabı Sil</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function filterBooks() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = library.filter(b => 
            b.title.toLowerCase().includes(term) || 
            b.author.toLowerCase().includes(term) || 
            b.publisher.toLowerCase().includes(term)
        );
        renderLibrary(filtered);
    }

    // --- DIŞA AKTAR / İÇE AKTAR (PROFESYONEL YEDEKLEME) ---
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(library);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Library");
        XLSX.writeFile(wb, "Kutuphane_Rapor.xlsx");
    }

    function backupJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "library_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importJSON(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if(confirm(`${imported.length} kitap yüklenecek. Mevcut liste ile birleştirilsin mi?`)) {
                    library = [...imported, ...library];
                    // Tekilleştirme (Aynı ID'li kitapları temizle)
                    library = Array.from(new Map(library.map(item => [item.id, item])).values());
                    localStorage.setItem('pro_library_v3', JSON.stringify(library));
                    renderLibrary(library);
                }
            } catch(err) { alert("Geçersiz dosya formatı!"); }
        };
        reader.readAsText(event.target.files[0]);
    }

    // --- MODAL YÖNETİMİ ---
    function toggleManualForm() {
        const m = document.getElementById('manual-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function saveManual() {
        const book = {
            id: Date.now(),
            title: document.getElementById('m-title').value,
            author: document.getElementById('m-author').value,
            publisher: document.getElementById('m-publisher').value,
            year: document.getElementById('m-year').value,
            summary: document.getElementById('m-summary').value,
            img: ''
        };
        if(!book.title) return alert("Başlık zorunlu!");
        commitToLibrary(book);
        toggleManualForm();
        // Formu temizle
        document.querySelectorAll('#manual-modal input, #manual-modal textarea').forEach(i => i.value = '');
    }
</script>
</body>
</html>
